site_name: GoVEX Documentation
site_description: Vulnerability management library and CLI toolkit for Go
site_url: https://grokify.github.io/govex/
repo_url: https://github.com/grokify/govex
repo_name: grokify/govex

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - tables
  - admonitions
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - CLI Reference:
      - Overview: cli/index.md
      - govex merge: cli/merge.md
      - govex homepage: cli/homepage.md
      - govex letter: cli/letter.md
  - Packages:
      - Core (govex): packages/core.md
      - Severity & SLA: packages/severity.md
      - Letter Generation: packages/letter.md
  - Integrations:
      - Overview: integrations/index.md
      - Analyzers:
          - Semgrep: integrations/semgrep.md
          - SpotBugs: integrations/spotbugs.md
      - Feeds:
          - CISA KEV: integrations/cisakev.md
  - Standards:
      - Overview: standards/index.md
      - CVE 2.0: standards/cve.md
      - CVSS: standards/cvss.md
      - CWE: standards/cwe.md
      - CSAF: standards/csaf.md
  - Reports:
      - Overview: reports/index.md
      - Site Writer: reports/sitewriter.md
      - PSIRT Report: reports/psirtreport.md
      - Release BOM: reports/releasebom.md
      - POAM: reports/poam.md
  - Reference:
      - Vulnerability Formats: reference/vulnerability-formats.md
      - Vulnerability Status: reference/status.md
      - SLA Management: reference/sla.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/grokify/govex
